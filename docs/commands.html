<!DOCTYPE html>
<html>
<head>
    <title>FFSplaat Commands</title>

    <style>
    body {
        background: black;
        color: white;
        font-family: Arial, sans-serif;
        margin: 40px;
    }

    h1, h2 {
        color: #5865F2;
    }

    .command {
        background: #222;
        padding: 10px;
        border-radius: 8px;
        margin: 10px 0;
    }

    a {
        color: #5865F2;
    }
    </style>
</head>
<body>

<h1>FFSplaat Commands</h1>

<h2>Video Filters</h2>

<div class="command">.v blur</div>
<div class="command">.v sharpen</div>
<div class="command">.v hue</div>
<div class="command">.v grayscale</div>
<div class="command">.v invert</div>
<div class="command">.v hflip</div>
<div class="command">.v rotate</div>
<div class="command">.v fps</div>

<h2>Audio Filters</h2>

<div class="command">.a pitch</div>
<div class="command">.a bassboost</div>
<div class="command">.a echo</div>
<div class="command">.a reverb</div>
<div class="command">.a speed</div>
<div class="command">.a reverse</div>
<div class="command">.a volume</div>
<div class="command">.a distort</div>

<p><a href="index.html">← Back to Home</a></p>

</body>
</html>
